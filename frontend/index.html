<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoMind - AI 电商专家</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Markdown and Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader-content">
            <div class="spinner"></div>
            <h3>正在初始化 EcoMind AI 系统</h3>
            <p>加载多语言向量模型中，请稍候 (约 20-30 秒)...</p>
        </div>
    </div>

    <div class="container">
        <!-- Sidebar: Conversation History -->
        <aside id="sidebar">
            <header class="sidebar-header">
                <h2>对话历史</h2>
                <button id="settings-btn" class="icon-btn" title="系统设置">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </header>
            <button id="new-conversation-btn" class="new-conversation-btn">新对话</button>
            <div id="conversation-list" class="conversation-list">
                <!-- Conversation items will be populated by JavaScript -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="chat-container" class="chat-container">
            <header class="chat-header">
                <h1>EcoMind - AI 电商专家</h1>
            </header>
            
            <section id="messages" class="messages">
                <!-- Chat messages will be populated by JavaScript -->
            </section>

            <section class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="message-input" 
                        class="message-input" 
                        placeholder="在此输入您的问题..."
                        rows="1"
                    ></textarea>
                    <button id="send-btn" class="send-btn" title="发送消息">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h3>系统配置</h3>
                <button class="close-modal">&times;</button>
            </header>
            <form id="settings-form" class="settings-form">
                <div class="form-group">
                    <label for="llm_provider">LLM 提供商</label>
                    <select id="llm_provider" name="llm_provider">
                        <option value="ollama">OLLAMA / oMLX (本地)</option>
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="llm_model">模型名称</label>
                    <input type="text" id="llm_model" name="llm_model" placeholder="例如: gpt-4o-mini">
                </div>
                <div class="form-group">
                    <label for="llm_base_url">API 基础 URL</label>
                    <input type="text" id="llm_base_url" name="llm_base_url" placeholder="例如: http://127.0.0.1:8000">
                </div>
                <div class="form-group">
                    <label for="llm_api_key">API 密钥 (可选)</label>
                    <input type="password" id="llm_api_key" name="llm_api_key" placeholder="本地模型通常不需要">
                </div>
                <div class="form-group">
                    <label for="wiki_path">知识库路径 (本地目录)</label>
                    <input type="text" id="wiki_path" name="wiki_path" placeholder="例如: /Users/a1234/wiki/articles">
                </div>
                <div class="form-actions">
                    <button type="submit" class="save-btn">保存配置</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
