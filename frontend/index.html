<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Henry - AI 电商专家</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loader-content">
            <div class="spinner"></div>
            <h3>正在初始化 Henry AI 系统</h3>
            <p>加载多语言向量模型中，请稍候 (约 20-30 秒)...</p>
        </div>
    </div>

    <div class="container">
        <!-- Sidebar: Conversation History -->
        <aside id="sidebar">
            <header class="sidebar-header">
                <h2>对话历史</h2>
            </header>
            <button id="new-conversation-btn" class="new-conversation-btn">新对话</button>
            <div id="conversation-list" class="conversation-list">
                <!-- Conversation items will be populated by JavaScript -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="chat-container" class="chat-container">
            <header class="chat-header">
                <h1>Henry - AI 电商专家</h1>
            </header>
            
            <section id="messages" class="messages">
                <!-- Chat messages will be populated by JavaScript -->
            </section>

            <section class="input-area">
                <div class="input-wrapper">
                    <textarea 
                        id="message-input" 
                        class="message-input" 
                        placeholder="在此输入您的问题..."
                        rows="1"
                    ></textarea>
                    <button id="send-btn" class="send-btn" title="发送消息">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
